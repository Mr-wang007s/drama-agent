# === C 级角色索引（合并文件）===
# C 级 = 工具角色（背景人物/一次性敌人/符号化角色）
# 不创建独立目录，统一在本文件中以条目形式存在
# 当某个 C 级角色因剧情需要升级为 B/A 时，使用 retier 命令迁移
#
# 推荐数量：30-50 人

meta:
  story: {{story}}
  tier: C
  version: "4.0"
  total: 0
  updated_at: {{updatedAt}}

# ═══════════════════════════════════════════════════════════════
#  C 级角色清单（极简结构）
# ═══════════════════════════════════════════════════════════════
characters:
  # 示例条目（按需复制）
  - id: example-id
    name: 示例名
    tag: [势力, 职能]                    # 简单标签
    location: {{location}}               # 出现位置
    one_liner: {{oneLiner}}              # 一句话人设
    quirk: {{quirk}}                     # 一个记忆点（如"九指"、"哑女"）
    status: active
