meta:
  version: "4.0"
  genre: "romance"
  description: "言情题材预设，适合爱情故事、情感纠葛、关系成长类故事"

story:
  title: "未命名言情故事"
  genre: "romance"
  logline: ""
  theme: "爱与成长"
  tone: "温暖、细腻、情感丰富"

world:
  core_settings:
    - "情感真实是第一优先"
    - "关系发展有合理节奏"
    - "外部冲突推动内心成长"

  long_term_mysteries:
    - "感情的归宿：最终会在一起吗？"
    - "内心的障碍：什么阻止了爱？"

  locations:
    - name: "日常相处地"
      description: "主角们经常见面的地方"
    - name: "私密空间"
      description: "促进亲密的场所"
    - name: "冲突发生地"
      description: "误会或矛盾爆发的地方"
    - name: "和解之地"
      description: "最终解开心结的地方"

  time_rules: "顺叙为主，闪回用于揭示过去"

  narrative_guidelines:
    - "情感真实：行为符合角色性格"
    - "误会合理：不为误会而误会"
    - "成长优先：爱情促进个人成长"
    - "障碍内在：内心障碍比外部阻力重要"
    - "HE/BE 都需铺垫：结局需要前文支撑"

suggested_archetypes:
  - name: "主角A（较主动）"
    archetype: "英雄"
    traits: "有感情障碍需要克服"
    common_trauma:
      ghost: "过去的感情伤害"
      wound: "不敢再爱/不相信爱"
      lie: "爱会带来伤害"
      shield: "保持距离/伪装冷漠"

  - name: "主角B（较被动）"
    archetype: "变形者"
    traits: "外表与内心有反差"
    ocean_suggestion:
      openness: 55
      conscientiousness: 60
      extraversion: 45
      agreeableness: 60
      neuroticism: 50

  - name: "情敌/第三者"
    archetype: "阴影"
    traits: "制造冲突但不是反派"

  - name: "闺蜜/好友"
    archetype: "盟友"
    traits: "提供支持和推动剧情"

beat_template:
  - name: "相遇"
    description: "两人第一次见面，建立初印象"
  - name: "摩擦"
    description: "性格/立场冲突，产生火花"
  - name: "了解"
    description: "开始看到对方不同的一面"
  - name: "心动"
    description: "意识到自己的感情"
  - name: "接近"
    description: "关系升温，亲密时刻"
  - name: "障碍"
    description: "内心障碍或外部阻力出现"
  - name: "危机"
    description: "关系面临破裂"
  - name: "领悟"
    description: "认识到自己真正想要的"
  - name: "和解"
    description: "解开心结，坦诚相对"
  - name: "结局"
    description: "确立关系或作出决定"

agents: []

initial_state:
  current_episode: "ep01"
  current_scene: null
  global_tension: 0.25
  unresolved_threads:
    - "两人的感情走向"
  active_secrets: []
