# ═══════════════════════════════════════════════════════════════
#  悬疑题材预设 — Mystery Genre Preset
#  DramaAgent v4.0
# ═══════════════════════════════════════════════════════════════

meta:
  version: "4.0"
  genre: "mystery"
  description: "悬疑推理题材预设，适合谋杀案、失踪案、阴谋揭露类故事"

story:
  title: "未命名悬疑故事"
  genre: "mystery"
  logline: ""
  theme: "真相与谎言"
  tone: "沉重、紧张、层层剥茧"

world:
  core_settings:
    - "每个角色都有不可告人的秘密"
    - "真相往往与表象相反"
    - "时间线可以通过闪回揭示"

  long_term_mysteries:
    - "核心谜团：谁是真正的凶手/幕后黑手？"
    - "动机之谜：为什么要这样做？"

  locations:
    - name: "主要案发地"
      description: "故事的核心发生地，承载主要剧情"
    - name: "调查场所"
      description: "收集线索、审讯嫌疑人的地方"
    - name: "隐秘空间"
      description: "藏有关键证据或秘密的地方"

  time_rules: "倒叙与顺叙交织，通过闪回揭示过去"

  narrative_guidelines:
    - "悬念优先：每个场景结束时留下新的疑问"
    - "线索公平：读者/观众能够推理出真相"
    - "红鲱鱼：适当设置误导性线索"
    - "反转适度：不超过 3 次重大反转"
    - "情感真实：角色动机必须合理可信"

# ═══════════════════════════════════════════════════════════════
#  悬疑题材常用角色原型
# ═══════════════════════════════════════════════════════════════
suggested_archetypes:
  - name: "侦探/调查者"
    archetype: "英雄"
    traits: "观察敏锐、逻辑清晰、执着于真相"
    ocean_suggestion:
      openness: 65
      conscientiousness: 70
      extraversion: 45
      agreeableness: 40
      neuroticism: 50

  - name: "嫌疑人A"
    archetype: "阴影"
    traits: "有动机、有机会、隐藏秘密"
    common_lies:
      - "我不在场"
      - "我和死者没有过节"

  - name: "受害者相关人"
    archetype: "信使"
    traits: "提供关键信息、情感触发器"

  - name: "真凶/幕后黑手"
    archetype: "阴影"
    trauma_pattern:
      ghost: "过去受到的伤害"
      wound: "无法愈合的痛苦"
      lie: "唯有报复/控制才能解脱"
      shield: "完美的伪装"

# ═══════════════════════════════════════════════════════════════
#  悬疑题材剧情节拍模板
# ═══════════════════════════════════════════════════════════════
beat_template:
  - name: "案件发生"
    description: "发现尸体/失踪/异常事件，建立核心谜团"
  - name: "初步调查"
    description: "收集表面线索，嫌疑人浮出水面"
  - name: "第一个红鲱鱼"
    description: "误导性线索将调查引向错误方向"
  - name: "意外发现"
    description: "新证据打破原有假设"
  - name: "关系网揭示"
    description: "角色之间的隐秘关系曝光"
  - name: "危机时刻"
    description: "调查者陷入危险或道德困境"
  - name: "真相浮现"
    description: "关键证据出现，真凶轮廓清晰"
  - name: "最终对决"
    description: "与真凶的正面交锋"
  - name: "余波"
    description: "真相大白后的情感收尾"

agents: []  # 用户自定义角色

initial_state:
  current_episode: "ep01"
  current_scene: null
  global_tension: 0.4
  unresolved_threads:
    - "核心谜团"
  active_secrets: []
