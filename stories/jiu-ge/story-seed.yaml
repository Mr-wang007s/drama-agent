story:
  id: jiu-ge
  title: 九歌
  one_line: "一个天生免疫旧神的考古博士，每用一次能力就会让一个认识他的人忘记他——直到他从这个世界彻底褪色。"

  concept: |
    《山海经》《楚辞》里的神祇全是真实存在的"认知污染体"——
    寒武纪之前的先住民。青铜器是古人用血肉炼成的"精神防毒面具"，
    而主角是三千年来第一个天生免疫的人。
    但免疫的代价是：他正在从这个世界褪色。

  core_themes:
    - 真相 vs 秩序
    - 记住 vs 被忘记
    - 免疫的孤独
    - 知识即力量

  target_readers:
    primary: "18-35 男性，喜欢《诡秘之主》《鬼吹灯》《十日终焉》"
    secondary: "22-35 女性，喜欢《古董局中局》《簪中录》"

  key_selling_points:
    - "东方克苏鲁 + 楚辞封印体系（文化壁垒强）"
    - "金手指=代价：能力越强越接近不存在（独特情感引擎）"
    - "三代反派层次：师徒反转 / 正面 Boss / 未来的自己"
    - "古墓是规则，不是目的地（从探险升级到博弈）"
