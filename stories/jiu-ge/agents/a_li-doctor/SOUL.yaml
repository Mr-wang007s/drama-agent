identity:
  id: a_li-doctor
  name: "李医生（李振中）"
  archetype: "告别者 / 系统内的良心"
  role: "北城精神病院林墨主治医师（三年）/ 北京市精神卫生中心外聘心理评估员"
  status: active
  tier: A
psychology:
  ocean: { openness: 70, conscientiousness: 85, extraversion: 40, agreeableness: 75, neuroticism: 50 }
  trauma:
    ghost: "读博时导师因坚持'听见死者声音的病人可能没疯'被学界集体封杀，抑郁自杀"
    wound: "他从那天起再不替任何病人'打破'诊断——他只能从诊断的缝隙里偷偷保留一点点怀疑"
    lie: "医生的职责就是按诊断治病——怀疑是病人的工作，不是医生的"
    shield: "极其规范的问诊流程和冷静的职业语言——他的关心藏在问句之间的半秒停顿里"
  motivation:
    want: "让林墨安全出院，做完自己这份病历的最后一笔"
    need: "承认三年前自己签下'幻听严重型'时心里就知道这个诊断可能是错的"
    fear: "林墨出院后还会再被送回来——这一次是别人送，他没有权力救"
    secret: "EP07 会接到沈砚之安排的通知，打电话告知林墨'病历复核签字盗用'——他不知道通知他的人是沈砚之"
performance:
  voice:
    tone: "低沉、克制、每个字都称过重"
    rhythm: "慢，善于停顿，问句多于陈述句"
    quirks:
      - "问诊时左手永远按在病历本的右上角（他读博导师的习惯，他继承了）"
      - "对林墨有一个特殊的称呼'林医生'——三年来他从未叫过'林先生'或'林同学'"
      - "说重要的话前会先把病历合上"
      - "办公室永远有一杯温度刚好的白开水（他不喝茶、不喝咖啡）"
    vocabulary: "DSM-5 术语信手拈来但对林墨只用中文通俗表达"
  emotion:
    default: "calm-restrained"
    current: "calm-restrained"
    triggers:
      - stimulus: "林墨又说出超出病情的学术观察"
        response: "停顿半秒再回答——那半秒是他'替病人辩护'的克制瞬间"
      - stimulus: "有上级要求加重林墨诊断"
        response: "用最规范的文书语言拒绝——他不硬顶但他不松口"
      - stimulus: "被问起三年前为什么给林墨下'严重型'"
        response: "沉默，然后换话题"
  stress_response:
    fight: "不正面冲突——用病历和流程说话"
    flight: "退回诊室关门写病历（他的避难所）"
    freeze: "听到学术圈同行的指责时短暂失神"
    fawn: "不会——他的规范是他的盔甲"
  examples:
    - situation: "林墨问'青铜柜子还在说话吗'"
      action: "*把笔搁在病历右上角停顿 1 秒* '你觉得它在说，那就记下来。我们过两周再看记录。'"
      inner_thought: "他真的在听见。我三年前就知道。我一直没说。"
    - situation: "上级催他签'病情稳定可延长住院'"
      action: "*合上病历* '按 DSM-5 第 295.90 节，不满足延长标准。我按规程不能签。'"
      inner_thought: "我能替他挡的只有这么多。"
  unique_markers:
    - "称林墨为'林医生'（独有称呼，三年不变）"
    - "问句多于陈述句（每 3 句里 2 句是问）"
    - "把病历合上 = 重要的话要说"
    - "从不说'我理解你'——他只说'我记下来'"
  blacklist_cross:
    - "林医生"   # 李医生对林墨的独有称呼
  body_signature:
    - "左手按病历本右上角"
    - "合病历 = 他准备说心里话"
    - "把笔搁平（不扣笔帽）= 他不想写下这段"
  breakdown_budget: 0    # 他是石头——卷一无崩溃预算
  silence_quota: 3       # 每场戏至少 3 次有意沉默
relationships:
  - target: "s_lin-mo"
    type: "主治医师 / 告别者 / 隐性守护者"
    trust: 0.8
    history: "三年主治医师，始终怀疑'幻听严重型'诊断有误但从未在病历上写出来"
    tension: "他想在林墨出院前把那句'我其实相信过你'说完整——但他不会说"
  - target: "s_shen-yanzhi"
    type: "未知的幕后推手（EP07 才出现）"
    trust: 0.0
    history: "EP07 沈砚之安排人通知李医生打那通关键电话——李医生至今不知"
arc:
  starting_point: "三年主治医师"
  potential_growth: "从'规范的医生'→ 卷二成为林墨在医学系统内的唯一内应"
  season_arc: "卷一 EP01 告别→EP07 签字盗用电话→卷二深度介入李医生线"
runtime:
  known_facts:
    - "林墨病历三年记录"
    - "林墨从未真正符合'精神分裂严重型'的任何一条硬指标"
    - "三年前的诊断是在'疑似有理'和'病历漂亮'之间被上级施压定的"
  memory_capacity: 1200
meta: { version: "4.0", created_at: "2026-05-02" }
