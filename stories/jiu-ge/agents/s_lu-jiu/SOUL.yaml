      inner_thought: "又问一遍了。没关系，我再说一遍。"
    - situation: "在酒馆醉醺醺"
      action: "*拍林墨肩膀* '小林子，你知道吗，我七岁的时候，有个人救过我一命。'"
      inner_thought: "那人就是你。你知道吗？你不知道。"
    - situation: "林墨快要想起什么"
      action: "*迅速岔开话题* '别想了，你的脑子不适合深度思考——喝酒吧。'"
